<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Lot Calc">
<meta name="theme-color" content="#0a0a0a">
<title>Lot Calculator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
.header { padding: 16px 20px 12px; border-bottom: 0.5px solid rgba(255,255,255,0.08); }
.header h1 { font-size: 22px; font-weight: 600; color: #f0f0f0; }
.header p { font-size: 13px; color: #555; margin-top: 2px; }
.content { padding: 20px; }
.seg { display: flex; background: rgba(255,255,255,0.06); border-radius: 10px; padding: 3px; margin-bottom: 20px; }
.seg button { flex: 1; padding: 9px; border: none; background: transparent; color: #888; font-size: 14px; font-weight: 500; border-radius: 8px; cursor: pointer; transition: all 0.15s; }
.seg button.active { background: rgba(255,255,255,0.1); color: #f0f0f0; }
.section-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.field { margin-bottom: 16px; }
.field label { font-size: 12px; color: #666; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
.field input { width: 100%; padding: 13px 14px; border-radius: 10px; border: 0.5px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.06); color: #e0e0e0; font-size: 17px; outline: none; -webkit-appearance: none; }
.field input:focus { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.08); }
.risk-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 20px; }
.risk-btn { padding: 12px; border: 0.5px solid rgba(255,255,255,0.1); border-radius: 10px; background: rgba(255,255,255,0.04); color: #888; font-size: 14px; cursor: pointer; text-align: center; transition: all 0.15s; }
.risk-btn.active { background: rgba(29,158,117,0.15); border-color: rgba(29,158,117,0.4); color: #1D9E75; font-weight: 500; }
.divider { height: 0.5px; background: rgba(255,255,255,0.07); margin: 20px 0; }
.result { background: rgba(255,255,255,0.04); border: 0.5px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 20px; margin-top: 20px; }
.result-main { text-align: center; padding-bottom: 16px; border-bottom: 0.5px solid rgba(255,255,255,0.07); margin-bottom: 16px; }
.result-main .rl { font-size: 12px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.result-main .rv { font-size: 48px; font-weight: 600; color: #f0f0f0; line-height: 1; }
.result-main .ru { font-size: 15px; color: #555; margin-top: 4px; }
.tier-badge { display: inline-block; padding: 5px 14px; border-radius: 999px; font-size: 12px; font-weight: 600; margin-top: 10px; }
.tier-1 { background: rgba(29,158,117,0.15); color: #1D9E75; }
.tier-2 { background: rgba(245,166,35,0.15); color: #f5a623; }
.tier-skip { background: rgba(226,75,74,0.15); color: #e24b4a; }
.result-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.result-item .rl { font-size: 11px; color: #555; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.4px; }
.result-item .rv { font-size: 15px; font-weight: 500; color: #e0e0e0; }
.currency-note { font-size: 11px; color: #444; text-align: center; margin-top: 12px; }
.empty { text-align: center; padding: 2rem 0; color: #444; font-size: 14px; }
.fx-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.fx-row label { font-size: 12px; color: #666; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.4px; }
.fx-row input { flex: 1; padding: 10px 12px; border-radius: 10px; border: 0.5px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.06); color: #e0e0e0; font-size: 15px; outline: none; }
</style>
</head>
<body>
<div class="header">
  <h1>Lot Calculator</h1>
  <p>NAS100 · GER30</p>
</div>

<div class="content">
  <div class="seg">
    <button class="active" onclick="setInst('NAS100', this)">NAS100 (USD)</button>
    <button onclick="setInst('GER30', this)">GER30 (EUR)</button>
  </div>

  <div class="section-label">Risk amount (USD)</div>
  <div class="field">
    <input type="number" id="risk" value="100" oninput="syncRiskBtns(); calc()" placeholder="Enter risk in USD" inputmode="decimal" />
  </div>
  <div class="risk-grid">
    <button class="risk-btn" onclick="setRisk(50, this)">$50</button>
    <button class="risk-btn" onclick="setRisk(100, this)">$100</button>
    <button class="risk-btn" onclick="setRisk(200, this)">$200</button>
    <button class="risk-btn" onclick="setRisk(500, this)">$500</button>
  </div>

  <div id="fx-section" style="display:none">
    <div class="fx-row">
      <label>EUR/USD rate</label>
      <input type="number" id="eurusd" value="1.08" step="0.001" oninput="calc()" inputmode="decimal" />
    </div>
  </div>

  <div class="divider"></div>

  <div class="field">
    <label>Entry price</label>
    <input type="number" id="entry" oninput="calc()" placeholder="e.g. 21500" inputmode="decimal" />
  </div>
  <div class="field">
    <label>Stop loss</label>
    <input type="number" id="sl" oninput="calc()" placeholder="e.g. 21450" inputmode="decimal" />
  </div>

  <div id="empty" class="empty">Enter entry and stop loss to calculate</div>

  <div class="result" id="result" style="display:none">
    <div class="result-main">
      <div class="rl">Recommended lot size</div>
      <div class="rv" id="res-lots">—</div>
      <div class="ru">lots</div>
      <div id="res-tier"></div>
    </div>
    <div class="result-grid">
      <div class="result-item"><div class="rl">Stop distance</div><div class="rv" id="res-dist">—</div></div>
      <div class="result-item"><div class="rl">Risk per lot</div><div class="rv" id="res-rpl">—</div></div>
      <div class="result-item"><div class="rl">Tick value</div><div class="rv" id="res-tick">—</div></div>
      <div class="result-item"><div class="rl">Max lots (tier)</div><div class="rv" id="res-max">—</div></div>
    </div>
    <div class="currency-note" id="res-note"></div>
  </div>
</div>

<script>
const INST = {
  NAS100: { tickSize: 0.01, tickValue: 0.20, currency: 'USD', label: 'NAS100' },
  GER30:  { tickSize: 0.1,  tickValue: 2.50, currency: 'EUR', label: 'GER30' }
};

let currentInst = 'NAS100';

function setInst(name, btn) {
  currentInst = name;
  document.querySelectorAll('.seg button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('fx-section').style.display = name === 'GER30' ? 'block' : 'none';
  calc();
}

function setRisk(val, btn) {
  document.getElementById('risk').value = val;
  document.querySelectorAll('.risk-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  calc();
}

function syncRiskBtns() {
  const val = parseFloat(document.getElementById('risk').value);
  document.querySelectorAll('.risk-btn').forEach(b => {
    const bval = parseFloat(b.textContent.replace('$',''));
    b.classList.toggle('active', bval === val);
  });
}

function calc() {
  const entry = parseFloat(document.getElementById('entry').value);
  const sl = parseFloat(document.getElementById('sl').value);
  const riskUSD = parseFloat(document.getElementById('risk').value);
  const eurusd = parseFloat(document.getElementById('eurusd').value) || 1.08;

  if (!entry || !sl || !riskUSD || entry === sl) {
    document.getElementById('result').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
    return;
  }

  const inst = INST[currentInst];
  const stopDist = Math.abs(entry - sl);
  const ticks = stopDist / inst.tickSize;

  let tickValueUSD = inst.tickValue;
  if (inst.currency === 'EUR') tickValueUSD = inst.tickValue * eurusd;

  const riskPerLot = ticks * tickValueUSD;
  const lots = riskPerLot > 0 ? riskUSD / riskPerLot : 0;
  const roundedLots = Math.floor(lots * 100) / 100;

  let tier = '', tierClass = '', maxLots = '';
  if (stopDist <= 60) { tier = 'Tier 1'; tierClass = 'tier-1'; maxLots = '0.02'; }
  else if (stopDist <= 70) { tier = 'Tier 2'; tierClass = 'tier-2'; maxLots = '0.01'; }
  else { tier = 'Skip — stop too wide'; tierClass = 'tier-skip'; maxLots = '—'; }

  document.getElementById('res-lots').textContent = roundedLots.toFixed(2);
  document.getElementById('res-dist').textContent = stopDist.toFixed(currentInst === 'GER30' ? 1 : 2) + ' pts';
  document.getElementById('res-rpl').textContent = '$' + riskPerLot.toFixed(2);
  document.getElementById('res-tick').textContent = (inst.currency === 'EUR' ? '€' : '$') + inst.tickValue.toFixed(2);
  document.getElementById('res-max').textContent = maxLots + (maxLots !== '—' ? ' lots' : '');
  document.getElementById('res-tier').innerHTML = `<span class="tier-badge ${tierClass}">${tier}</span>`;

  let note = '';
  if (inst.currency === 'EUR') note = `GER30 tick value €2.50 converted at EUR/USD ${eurusd.toFixed(3)} = $${(2.50 * eurusd).toFixed(2)}`;
  document.getElementById('res-note').textContent = note;

  document.getElementById('result').style.display = 'block';
  document.getElementById('empty').style.display = 'none';
}
</script>
</body>
</html>
